<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Count Receipt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:linear-gradient(135deg,#FF8C00 0%,#FFB347 100%);min-height:100vh;padding:20px}
.main-grid{display:grid;grid-template-columns:1fr 2fr;gap:20px;max-width:1400px;margin:auto}
.receipt-area{background:#fff9f0;padding:20px;border-radius:8px;box-shadow:0 4px 15px rgba(255,140,0,0.3)}
#receiptArea{background:#fff;width:320px;margin:auto;padding:12px;border:2px solid #FF8C00;border-radius:4px;font-size:11px;box-shadow:inset 0 0 10px rgba(255,140,0,0.1)}
#receiptArea p{text-align:center;margin:4px 0;font-weight:bold;font-size:10px}
#receiptArea .separator{border-top:2px dashed #FF8C00;margin:8px 0;padding-top:8px}
#receiptArea h2{font-size:14px;margin:8px 0;border-top:2px solid #FF8C00;padding-top:6px}
#receiptArea table{font-size:10px}
#receiptArea th{padding:6px;font-size:10px}
#receiptArea td{padding:4px;font-size:10px}
#receiptArea input[type=date]{font-size:10px;padding:4px;border:none;background:transparent;width:auto;text-align:center;cursor:pointer}
#receiptArea textarea{font-size:12px;padding:12px;min-height:70px;border:1px solid #e0b12b;background:#fff7b8;box-shadow:4px 4px 0 rgba(204,153,0,0.25);border-radius:8px;resize:vertical}
.comments-box{border:1px solid #e0b12b;padding:12px;margin:8px 0;border-radius:10px;background:#fff7b8;font-size:12px;box-shadow:5px 5px 0 rgba(204,153,0,0.2)}
.date-display{font-weight:bold;color:#333;margin:0;letter-spacing:0.5px;font-size:11px}
.export-mode input[type=number]{border:none !important}
.export-mode td:last-child{font-weight:bold}
.export-mode .comments-export{border:1px solid #e0b12b;padding:12px;margin:8px 0;border-radius:10px;background:#fff7b8;font-size:12px;white-space:pre-wrap;word-wrap:break-word;box-shadow:5px 5px 0 rgba(204,153,0,0.2)}
h1{text-align:center;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:20px;font-size:28px}
h2{text-align:center;color:#FF8C00;font-size:18px;margin:15px 0;border-top:2px solid #FF8C00;padding-top:10px}
h3{color:#FF8C00;margin-bottom:10px}
.container{background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#FF8C00;color:#fff;padding:10px;text-align:center;font-weight:bold}
td{border-bottom:1px solid #FFE0CC;padding:8px;text-align:center}
tr:hover{background:#FFF5E6}
input[type=number],input[type=date],input[type=text]{width:100%;padding:8px;border:1px solid #FF8C00;border-radius:4px;font-family:'Courier New',monospace}
.card{background:#FFF5E6;padding:15px;border-radius:8px;border-left:4px solid #FF8C00}
button{padding:12px 16px;margin:6px 4px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px;transition:all 0.3s}
.btn-save{background:#FF8C00;color:#fff}
.btn-save:hover{background:#FF7700;transform:translateY(-2px);box-shadow:0 4px 10px rgba(255,140,0,0.4)}
.btn-pdf{background:#FFA500;color:#fff}
.btn-pdf:hover{background:#FF8C00;transform:translateY(-2px);box-shadow:0 4px 10px rgba(255,165,0,0.4)}
.btn-share{background:#FFB347;color:#333}
.btn-share:hover{background:#FFA500;transform:translateY(-2px)}
.btn-reset{background:#FF6347;color:#fff}
.btn-reset:hover{background:#FF5533;transform:translateY(-2px)}
.btn-view{background:#FF8C00;color:#fff;padding:6px 10px;font-size:11px}
.btn-delete{background:#FF6347;color:#fff;padding:6px 10px;font-size:11px}
.actions{display:flex;flex-wrap:wrap;justify-content:center;margin-top:15px;gap:8px}
.history-item{padding:12px;border-bottom:2px solid #FFE0CC;background:#FFF5E6;margin-bottom:8px;border-radius:4px}
.history-item b{color:#FF8C00}
.search-input{background:#FFF5E6;border:2px solid #FF8C00;padding:10px}
textarea{width:100%;padding:8px;border:1px solid #FF8C00;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;resize:vertical;min-height:80px}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}.receipt-area{padding:10px}}
</style>
</head>
<body>
<h1>Cash Count Receipt System</h1>

<div class="main-grid">
<div class="receipt-area">
<div id="receiptArea">
<p>CASH COUNT</p>
<p>RECEIPT</p>
<div class="separator"></div>
<p><b>Receipt ID:</b></p>
<p id="receiptNo" style="color:#FF8C00;font-size:11px"></p>
<p><b>Date:</b></p>
<div style="text-align:center">
<input type="date" id="date" style="font-size:12px" onchange="updateDayOfWeek()">
</div>
<p id="dayOfWeek" style="font-size:11px;margin:5px 0;text-align:center"></p>
<p id="starIcon" style="text-align:center;display:none"><b>⭐</b></p>
<textarea id="comments" placeholder="Add notes or comments..." class="comments-box" oninput="toggleCommentsDisplay()"></textarea>
<div class="separator"></div>


<table>
<thead><tr><th style="font-size:12px">Denomination</th><th style="font-size:12px">Qty</th><th style="font-size:12px">Amount</th></tr></thead>
<tbody id="rows"></tbody>
</table>

<div class="separator"></div>
<h2>Total: RM <span id="total">0.00</span></h2>
<p style="font-size:9px;margin-top:8px;color:#666">Thank you!</p>
<div id="openingCashPanel" class="card" style="margin-top:16px">
<h3 style="margin-bottom:10px;color:#FF8C00">Opening Cash Calculator</h3>
<p style="margin:6px 0;font-size:12px">Target opening cash: RM <input type="number" id="openingTarget" value="0" step="0.01" min="0" style="width:120px;font-size:12px" oninput="calcOpeningCash()"></p>
<div class="separator"></div>
<p style="font-size:12px;text-align:right">Counted Total: RM <span id="openingTotal">0.00</span></p>
<p style="font-size:12px;text-align:left;margin-top:6px">Left as opening cash: RM <span id="openingLeft">0.00</span></p>
<p style="font-size:12px;text-align:left;">Cash to take out: RM <span id="cashToTakeOut">0.00</span></p>
<div id="openingPlan" style="font-size:11px;color:#333;margin-top:8px">Enter a target to calculate.</div>
</div>
</div>

<div class="actions">
<button class="btn-save" onclick="saveReceipt()">Save Receipt</button>
<button class="btn-pdf" onclick="savePDF()">Save PDF</button>
<button class="btn-share" onclick="saveImage()">Save Image</button>
<button class="btn-reset" onclick="resetForm()">New Receipt</button>
</div>
</div>

<div class="container">
<h3>Receipt History</h3>
<input id="search" class="search-input" placeholder="Search by ID / date / total" oninput="renderHistory()">
<div id="history"></div>
</div>
</div>

<script>
const denoms=[100,50,20,10,5,1,0.5,0.2,0.1,0.05];
const labels=["RM100","RM50","RM20","RM10","RM5","RM1","50 Sen","20 Sen","10 Sen","5 Sen"];
const rows=document.getElementById("rows");

labels.forEach((l,i)=>{
rows.innerHTML+=`<tr>
<td>${l}</td>
<td><input type="number" min="0" value="0" onchange="calc()" id="q${i}"></td>
<td>RM <span id="a${i}">0.00</span></td>
</tr>`;
});

function calcOpeningCash(){
const total=Number(document.getElementById("total").innerText)||0;
const target=Number(document.getElementById("openingTarget").value)||0;
document.getElementById("openingTotal").innerText=total.toFixed(2);
if(target<=0){
 document.getElementById("openingPlan").innerText="Enter a target to calculate opening cash.";
 updateOpeningSummary(total,target);
 return;
}
updateOpeningSummary(total,target);
}

function updateOpeningSummary(total,target){
const cashToTakeOut = Math.max(0, total - target);
if(target<=0){
 document.getElementById("cashToTakeOut").innerText = '0.00';
 document.getElementById("openingLeft").innerText = '0.00';
 document.getElementById("openingPlan").innerText = 'Enter a target to calculate opening cash.';
 return;
}
if(cashToTakeOut > 0){
 document.getElementById("cashToTakeOut").innerText = cashToTakeOut.toFixed(2);
 document.getElementById("openingLeft").innerText = target.toFixed(2);
 const plan = computeTakeOutPlan(cashToTakeOut, getReceiptQuantities());
 document.getElementById("openingPlan").innerHTML = plan.length ? plan.map(item => `<div>${item}</div>`).join('') : `Take out RM ${cashToTakeOut.toFixed(2)} using available denominations.`;
} else {
 document.getElementById("cashToTakeOut").innerText = '0.00';
 document.getElementById("openingLeft").innerText = total.toFixed(2);
 document.getElementById("openingPlan").innerText = `Target is RM ${target.toFixed(2)}; keep all RM ${total.toFixed(2)} as opening cash.`;
}
}

function getReceiptQuantities(){
return denoms.map((_,i)=>parseInt(document.getElementById(`q${i}`).value)||0);
}

function computeTakeOutPlan(amount, quantities){
let remaining = Math.round(amount * 100) / 100;
const plan = [];
let totalUsed = 0;
denoms.forEach((denom, i) => {
 const available = quantities[i] || 0;
 if(!available) return;
 const count = Math.min(available, Math.floor(remaining / denom));
 if(count > 0){
 const itemAmount = count * denom;
 plan.push(`${labels[i]} x ${count} = RM ${itemAmount.toFixed(2)}`);
 totalUsed += itemAmount;
 remaining = Math.round((remaining - itemAmount) * 100) / 100;
 }
});
if(Math.abs(remaining) > 0.001){
 plan.push(`<span style="margin-top:4px;display:block;color:#c00">Need RM ${remaining.toFixed(2)} more or adjust the target.</span>`);
} else if(plan.length > 0) {
 plan.push(`<div style="margin-top:6px;border-top:1px solid #999;padding-top:4px;font-weight:bold">Total: RM ${totalUsed.toFixed(2)}</div>`);
}
return plan;
}

function newReceiptNo(dateValue){
const dateStr=(dateValue || document.getElementById("date")?.value || getKuchingDate()).replace(/-/g,'');
return "RCP-"+dateStr;
}

function updateReceiptNo(){
const dateValue=document.getElementById("date").value || getKuchingDate();
document.getElementById("receiptNo").innerText=newReceiptNo(dateValue);
}

function calc(){
let total=0;
denoms.forEach((d,i)=>{
let q=parseInt(document.getElementById("q"+i).value)||0;
let amt=q*d;
document.getElementById("a"+i).innerText=amt.toFixed(2);
total+=amt;
});
document.getElementById("total").innerText=total.toFixed(2);
calcOpeningCash();
}

function toggleCommentsDisplay(){
const comments=document.getElementById("comments").value.trim();
const starIcon=document.getElementById("starIcon");
if(comments.length>0){
 starIcon.style.display='block';
} else {
 starIcon.style.display='none';
}
}

function resetForm(){
try {
 document.querySelectorAll("input[type=number]").forEach(x=>x.value=0);
 document.getElementById("comments").value="";
 document.getElementById("openingTarget").value="0";
 document.getElementById("starIcon").style.display="none";
 document.getElementById("date").value=getKuchingDate();
 updateDayOfWeek();
 updateReceiptNo();
 calc();
} catch(error) {
 alert("Error resetting form: " + error.message);
}
}

function saveReceipt(){
try {
 calcOpeningCash();
 const data={
  receiptNo:document.getElementById("receiptNo").innerText,
  date:document.getElementById("date").value,
  dayOfWeek:document.getElementById("dayOfWeek").innerText,
  total:document.getElementById("total").innerText,
  comments:document.getElementById("comments").value,
  qtys: denoms.map((_,i)=>document.getElementById("q"+i).value)
 };
 let receipts=JSON.parse(localStorage.getItem("receipts")||"[]");
 receipts.unshift(data);
 localStorage.setItem("receipts",JSON.stringify(receipts));
 alert("Receipt saved successfully");
 renderHistory();
} catch(error) {
 if(error.message.includes("QuotaExceededError") || error.message.includes("localStorage")) {
  alert("Storage is full or blocked. Try clearing browser data or use private/incognito mode.");
 } else {
  alert("Error saving receipt: " + (error.message || "Unknown error"));
 }
 console.error("Save Error:", error);
}
}

function renderHistory(){
try {
 let receipts=JSON.parse(localStorage.getItem("receipts")||"[]");
 let q=document.getElementById("search").value.toLowerCase();
 let html="";
 receipts.filter(r=>
 r.receiptNo.toLowerCase().includes(q)||
 r.date.toLowerCase().includes(q)||
 r.total.toLowerCase().includes(q)||
 (r.comments&&r.comments.toLowerCase().includes(q))
 ).forEach((r,idx)=>{
 html+=`<div class='history-item'>
 <b>${r.receiptNo}</b><br>
 ${r.date} - ${r.dayOfWeek||""}<br>
 RM ${r.total}<br>`;
 if(r.comments){html+=`<p style='font-size:11px;margin:5px 0;color:#666;font-style:italic'>"${r.comments.substring(0,50)}${r.comments.length>50?"...":""}<br>`}
 html+=`<button class='btn-view' onclick='loadReceipt(${idx})'>View</button>
 <button class='btn-delete' onclick='deleteReceipt(${idx})'>Delete</button>
 </div>`;
 });
 document.getElementById("history").innerHTML=html||"<p style='color:#999;text-align:center;padding:20px'>No receipts found</p>";
} catch(error) {
 console.error("Error rendering history: ", error);
}
}

function loadReceipt(index){
try {
 let receipts=JSON.parse(localStorage.getItem("receipts")||"[]");
 let r=receipts[index];
 document.getElementById("receiptNo").innerText=r.receiptNo;
 document.getElementById("date").value=r.date;
 document.getElementById("comments").value=r.comments||"";
 document.getElementById("openingTarget").value="0";
 updateDayOfWeek();
 updateReceiptNo();
 r.qtys.forEach((v,i)=>document.getElementById("q"+i).value=v);
 calc();
 calcOpeningCash();
 toggleCommentsDisplay();
} catch(error) {
 alert("Error loading receipt: " + error.message);
}
}

function deleteReceipt(index){
try {
 let receipts=JSON.parse(localStorage.getItem("receipts")||"[]");
 receipts.splice(index,1);
 localStorage.setItem("receipts",JSON.stringify(receipts));
 renderHistory();
} catch(error) {
 alert("Error deleting receipt: " + error.message);
}
}

async function savePDF(){
try {
 const {jsPDF}=window.jspdf;
 const receiptArea=document.getElementById("receiptArea");
 const openingPanel=document.getElementById("openingCashPanel");
 const starIcon=document.getElementById("starIcon");
 const commentsArea=document.getElementById("comments");
 
 const savedDisplay={
  opening: openingPanel.style.display,
  star: starIcon.style.display,
  comments: commentsArea.style.display
 };
 
 openingPanel.style.display='none';
 starIcon.style.display='none';
 if(!commentsArea.value.trim()) commentsArea.style.display='none';
 
 await new Promise(resolve => setTimeout(resolve, 50));
 const canvas=await html2canvas(receiptArea,{scale:2,backgroundColor:'#ffffff',useCORS:true,allowTaint:true,logging:false});
 
 openingPanel.style.display=savedDisplay.opening;
 starIcon.style.display=savedDisplay.star;
 commentsArea.style.display=savedDisplay.comments;
 
 const imgData=canvas.toDataURL("image/png");
 if(!imgData || imgData.length < 100) throw new Error("Canvas rendering failed");
 
 const pdfWidth=210;const imgWidth=100;const imgHeight=(canvas.height*imgWidth)/canvas.width;
 const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
 pdf.addImage(imgData,"PNG",(pdfWidth-imgWidth)/2,20,imgWidth,imgHeight);
 const filename=document.getElementById("receiptNo").innerText+".pdf";
 pdf.save(filename);
 alert("PDF saved: "+filename);
} catch(error) {
 alert("Error saving PDF: " + (error.message || "Unknown error. Please try again."));
 console.error("PDF Error:", error);
}
}

async function saveImage(){
try {
 const receiptArea=document.getElementById("receiptArea");
 const openingPanel=document.getElementById("openingCashPanel");
 const starIcon=document.getElementById("starIcon");
 const commentsArea=document.getElementById("comments");
 
 const savedDisplay={
  opening: openingPanel.style.display,
  star: starIcon.style.display,
  comments: commentsArea.style.display
 };
 
 openingPanel.style.display='none';
 starIcon.style.display='none';
 if(!commentsArea.value.trim()) commentsArea.style.display='none';
 
 await new Promise(resolve => setTimeout(resolve, 50));
 const canvas=await html2canvas(receiptArea,{scale:2,backgroundColor:'#ffffff',useCORS:true,allowTaint:true,logging:false});
 
 openingPanel.style.display=savedDisplay.opening;
 starIcon.style.display=savedDisplay.star;
 commentsArea.style.display=savedDisplay.comments;
 
 const link=document.createElement("a");
 const filename=document.getElementById("receiptNo").innerText+".png";
 link.href=canvas.toDataURL("image/png");
 link.download=filename;
 link.click();
 alert("Image saved: "+filename);
} catch(error) {
 alert("Error saving image: " + (error.message || "Unknown error. Please try again."));
 console.error("Image Error:", error);
}
}

function getKuchingDate(){
const now=new Date();
const utcTime=now.getTime()+now.getTimezoneOffset()*60000;
const kuchingTime=new Date(utcTime+8*3600000);
const year=kuchingTime.getFullYear();
const month=String(kuchingTime.getMonth()+1).padStart(2,'0');
const day=String(kuchingTime.getDate()).padStart(2,'0');
return `${year}-${month}-${day}`;
}

function updateDayOfWeek(){
try {
 const dateInput=document.getElementById("date").value;
 if(!dateInput) return;
 const [year,month,day]=dateInput.split('-');
 const date=new Date(year,month-1,day);
 const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
 const dayName=days[date.getDay()];
 const dayOfWeekEl=document.getElementById("dayOfWeek");
 if(dayOfWeekEl) dayOfWeekEl.innerText=dayName;
 updateReceiptNo();
} catch(error) {
 console.error("Error updating day of week:", error);
}
}

function updateCommentsDisplay(){
const commentsText=document.getElementById("comments").value.trim();
const commentsSection=document.getElementById("commentsSection");
if(commentsSection){
 if(commentsText){
  commentsSection.style.display="block";
 }else{
  commentsSection.style.display="none";
 }
}
}

async function shareReceipt(){
const receiptNo=document.getElementById("receiptNo").innerText;
const date=document.getElementById("date").value;
const dayEl=document.getElementById("dayOfWeek");
const day=dayEl ? dayEl.innerText : "";
const total=document.getElementById("total").innerText;
const comments=document.getElementById("comments").value.trim();
let text=`Receipt ${receiptNo}\nDate: ${date} (${day})\nTotal RM ${total}`;
if(comments){
text += `\nComments: ${comments}`;
}
if(navigator.share){
await navigator.share({title:"Cash Receipt",text});
}else{
navigator.clipboard.writeText(text);
alert("Copied to clipboard");
}
}

document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("date").value=getKuchingDate();
updateDayOfWeek();
resetForm();
renderHistory();
});
</script>
</body>
</html>
