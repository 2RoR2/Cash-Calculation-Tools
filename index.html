<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Cash Count Receipt</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #FF8C00 0%, #FFB347 100%);
      min-height: 100vh;
      padding: 12px;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .receipt-area {
      background: #fff9f0;
      padding: 16px 12px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
    }
    #receiptArea {
      background: #fff;
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
      padding: 16px 12px;
      border: 2px solid #FF8C00;
      border-radius: 8px;
      font-size: 12px;
      box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.1);
    }
    #receiptArea p {
      text-align: center;
      margin: 6px 0;
      font-weight: bold;
      font-size: 11px;
    }
    #receiptArea .separator {
      border-top: 2px dashed #FF8C00;
      margin: 10px 0;
      padding-top: 8px;
    }
    #receiptArea h2 {
      font-size: 15px;
      margin: 10px 0;
      border-top: 2px solid #FF8C00;
      padding-top: 8px;
      text-align: center;
    }
    #receiptArea table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
    }
    #receiptArea th {
      padding: 6px 2px;
      font-size: 11px;
      background: #FF8C00;
      color: white;
      text-align: center;
    }
    #receiptArea td {
      padding: 6px 2px;
      font-size: 11px;
      text-align: center;
      border-bottom: 1px solid #ffe0cc;
      vertical-align: middle;
    }
    #receiptArea input[type="date"] {
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid #FF8C00;
      border-radius: 4px;
      background: #fffbf5;
      width: auto;
      text-align: center;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }
    #receiptArea textarea {
      font-size: 12px;
      padding: 10px;
      min-height: 60px;
      border: 1px solid #e0b12b;
      background: #fff7b8;
      border-radius: 8px;
      resize: vertical;
      width: 100%;
      font-family: 'Courier New', monospace;
    }
    .comments-box {
      border: 1px solid #e0b12b;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      background: #fff7b8;
      font-size: 12px;
      box-shadow: 4px 4px 0 rgba(204, 153, 0, 0.2);
    }
    .card {
      background: #FFF5E6;
      padding: 14px;
      border-radius: 10px;
      border-left: 4px solid #FF8C00;
      margin-top: 14px;
    }
    .card h3 {
      color: #FF8C00;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .card p {
      font-size: 12px;
      margin: 4px 0;
    }
    .card input[type="number"] {
      width: 100px;
      padding: 6px;
      border: 1px solid #FF8C00;
      border-radius: 4px;
      font-size: 13px;
      background: #fff;
      font-family: 'Courier New', monospace;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.2s;
      cursor: pointer;
      background: #FF8C00;
      color: white;
      box-shadow: 0 2px 6px rgba(255, 140, 0, 0.3);
      font-family: 'Courier New', monospace;
    }
    button:active {
      transform: scale(0.96);
    }
    .btn-save { background: #FF8C00; }
    .btn-pdf { background: #FFA500; }
    .btn-share { background: #FFB347; color: #222; }
    .btn-reset { background: #FF6347; }
    .btn-view { background: #FF8C00; padding: 4px 10px; font-size: 11px; }
    .btn-delete { background: #FF6347; padding: 4px 10px; font-size: 11px; }
    .container {
      background: #fff;
      padding: 18px 14px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }
    .container h3 {
      color: #FF8C00;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: bold;
    }
    .search-input {
      background: #FFF5E6;
      border: 2px solid #FF8C00;
      padding: 10px 12px;
      border-radius: 30px;
      width: 100%;
      font-size: 14px;
      margin-bottom: 14px;
      font-family: 'Courier New', monospace;
    }
    .history-item {
      padding: 12px;
      border-bottom: 2px solid #FFE0CC;
      background: #FFF5E6;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    .history-item b { color: #FF8C00; }
    #openingPlan {
      font-size: 12px;
      color: #333;
      margin-top: 8px;
      background: #fff2d9;
      padding: 8px;
      border-radius: 6px;
      word-break: break-word;
    }
    #starIcon {
      text-align: center;
      display: none;
      font-size: 14px;
      margin: 4px 0;
      color: #FF8C00;
    }
    /* quantity input - visible and touch friendly */
    input[type="number"] {
      width: 100%;
      max-width: 72px;
      padding: 8px 4px;
      font-size: 15px;
      font-weight: bold;
      border: 1.5px solid #FF8C00;
      border-radius: 6px;
      background: #ffffff;
      text-align: center;
      -moz-appearance: textfield;
      font-family: 'Courier New', monospace;
      color: #1a1a1a;
    }
    input[type="number"]:focus {
      background: #fff7e6;
      outline: 2px solid #FF8C00;
      outline-offset: 1px;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    /* ensure amount spans are visible */
    #receiptArea td span {
      font-weight: 600;
      color: #1a1a1a;
    }
    @media (max-width: 480px) {
      #receiptArea {
        padding: 12px 8px;
        font-size: 11px;
      }
      #receiptArea table {
        font-size: 10px;
      }
      #receiptArea th, #receiptArea td {
        padding: 5px 2px;
        font-size: 10px;
      }
      input[type="number"] {
        max-width: 60px;
        padding: 8px 2px;
        font-size: 14px;
      }
      .card input[type="number"] {
        width: 80px;
      }
      button {
        padding: 8px 12px;
        font-size: 12px;
      }
      .actions {
        gap: 6px;
      }
    }
    @media (min-width: 600px) {
      .main-grid {
        grid-template-columns: 1fr 1.2fr;
      }
    }
    /* ensure total is prominent */
    #total {
      font-size: 18px;
      color: #c75100;
    }
    .receipt-no {
      font-size: 13px;
      font-weight: bold;
      color: #FF8C00;
    }
    .day-text {
      font-size: 12px;
      margin: 4px 0;
      text-align: center;
      font-weight: normal;
    }
  </style>
</head>
<body>
<h1 style="text-align:center;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:16px;font-size:24px;font-family:'Courier New',monospace;">Cash Count Receipt</h1>

<div class="main-grid">
  <div class="receipt-area">
    <div id="receiptArea">
      <p>CASH COUNT</p>
      <p>RECEIPT</p>
      <div class="separator"></div>
      <p><b>Receipt ID:</b></p>
      <p id="receiptNo" class="receipt-no"></p>
      <p><b>Date:</b></p>
      <div style="text-align:center;">
        <input type="date" id="date" style="font-size:13px;padding:6px 10px;" onchange="updateDayOfWeek()">
      </div>
      <p id="dayOfWeek" class="day-text"></p>
      <p id="starIcon">*</p>
      <textarea id="comments" placeholder="Add notes or comments..." class="comments-box" oninput="toggleCommentsDisplay()"></textarea>
      <div class="separator"></div>

      <table>
        <thead><tr><th style="font-size:12px;">Denomination</th><th style="font-size:12px;">Qty</th><th style="font-size:12px;">Amount</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>

      <div class="separator"></div>
      <h2>Total: RM <span id="total">0.00</span></h2>
      <p style="font-size:9px;margin-top:6px;color:#666;text-align:center;">Thank you</p>

      <div id="openingCashPanel" class="card">
        <h3>Opening Cash Calculator</h3>
        <p style="margin:4px 0;font-size:12px;">Target opening cash: RM <input type="number" id="openingTarget" value="0" step="0.01" min="0" style="width:100px;font-size:13px;" oninput="calcOpeningCash()"></p>
        <div class="separator" style="margin:8px 0;"></div>
        <p style="font-size:12px;text-align:right;">Counted Total: RM <span id="openingTotal">0.00</span></p>
        <p style="font-size:12px;text-align:left;margin-top:4px;">Left as opening cash: RM <span id="openingLeft">0.00</span></p>
        <p style="font-size:12px;text-align:left;">Cash to take out: RM <span id="cashToTakeOut">0.00</span></p>
        <div id="openingPlan" style="font-size:11px;color:#333;margin-top:8px;">Enter a target to calculate.</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-save" onclick="saveReceipt()">Save</button>
      <button class="btn-pdf" onclick="savePDF()">PDF</button>
      <button class="btn-share" onclick="saveImage()">Image</button>
      <button class="btn-reset" onclick="resetForm()">New</button>
    </div>
  </div>

  <div class="container">
    <h3>Receipt History</h3>
    <input id="search" class="search-input" placeholder="Search by ID / date / total" oninput="renderHistory()">
    <div id="history"></div>
  </div>
</div>

<script>
  const denoms = [100, 50, 20, 10, 5, 1, 0.5, 0.2, 0.1, 0.05];
  const labels = ["RM100", "RM50", "RM20", "RM10", "RM5", "RM1", "50 Sen", "20 Sen", "10 Sen", "5 Sen"];
  const rows = document.getElementById("rows");

  // build table rows with clear quantity inputs
  labels.forEach((l, i) => {
    rows.innerHTML += `<tr>
      <td>${l}</td>
      <td><input type="number" min="0" value="0" onchange="calc()" id="q${i}" inputmode="numeric"></td>
      <td>RM <span id="a${i}">0.00</span></td>
    </tr>`;
  });

  // core functions
  function calc() {
    let total = 0;
    denoms.forEach((d, i) => {
      let q = parseInt(document.getElementById("q" + i).value) || 0;
      let amt = q * d;
      document.getElementById("a" + i).innerText = amt.toFixed(2);
      total += amt;
    });
    document.getElementById("total").innerText = total.toFixed(2);
    calcOpeningCash();
  }

  function calcOpeningCash() {
    const total = Number(document.getElementById("total").innerText) || 0;
    const target = Number(document.getElementById("openingTarget").value) || 0;
    document.getElementById("openingTotal").innerText = total.toFixed(2);
    if (target <= 0) {
      document.getElementById("openingPlan").innerText = "Enter a target to calculate opening cash.";
      updateOpeningSummary(total, target);
      return;
    }
    updateOpeningSummary(total, target);
  }

  function updateOpeningSummary(total, target) {
    const cashToTakeOut = Math.max(0, total - target);
    if (target <= 0) {
      document.getElementById("cashToTakeOut").innerText = '0.00';
      document.getElementById("openingLeft").innerText = '0.00';
      document.getElementById("openingPlan").innerText = 'Enter a target to calculate opening cash.';
      return;
    }
    if (cashToTakeOut > 0) {
      document.getElementById("cashToTakeOut").innerText = cashToTakeOut.toFixed(2);
      document.getElementById("openingLeft").innerText = target.toFixed(2);
      const plan = computeTakeOutPlan(cashToTakeOut, getReceiptQuantities());
      document.getElementById("openingPlan").innerHTML = plan.length ? plan.map(item => `<div>${item}</div>`).join('') : `Take out RM ${cashToTakeOut.toFixed(2)} using available denominations.`;
    } else {
      document.getElementById("cashToTakeOut").innerText = '0.00';
      document.getElementById("openingLeft").innerText = total.toFixed(2);
      document.getElementById("openingPlan").innerText = `Target is RM ${target.toFixed(2)}; keep all RM ${total.toFixed(2)} as opening cash.`;
    }
  }

  function getReceiptQuantities() {
    return denoms.map((_, i) => parseInt(document.getElementById(`q${i}`).value) || 0);
  }

  function computeTakeOutPlan(amount, quantities) {
    let remaining = Math.round(amount * 100) / 100;
    const plan = [];
    let totalUsed = 0;
    denoms.forEach((denom, i) => {
      const available = quantities[i] || 0;
      if (!available) return;
      const count = Math.min(available, Math.floor(remaining / denom));
      if (count > 0) {
        const itemAmount = count * denom;
        plan.push(`${labels[i]} x ${count} = RM ${itemAmount.toFixed(2)}`);
        totalUsed += itemAmount;
        remaining = Math.round((remaining - itemAmount) * 100) / 100;
      }
    });
    if (Math.abs(remaining) > 0.001) {
      plan.push(`<span style="margin-top:4px;display:block;color:#c00;">Need RM ${remaining.toFixed(2)} more or adjust the target.</span>`);
    } else if (plan.length > 0) {
      plan.push(`<div style="margin-top:6px;border-top:1px solid #999;padding-top:4px;font-weight:bold;">Total: RM ${totalUsed.toFixed(2)}</div>`);
    }
    return plan;
  }

  function newReceiptNo(dateValue) {
    const dateStr = (dateValue || document.getElementById("date")?.value || getKuchingDate()).replace(/-/g, '');
    return "RCP-" + dateStr;
  }

  function updateReceiptNo() {
    const dateValue = document.getElementById("date").value || getKuchingDate();
    document.getElementById("receiptNo").innerText = newReceiptNo(dateValue);
  }

  function toggleCommentsDisplay() {
    const comments = document.getElementById("comments").value.trim();
    const starIcon = document.getElementById("starIcon");
    starIcon.style.display = comments.length > 0 ? 'block' : 'none';
    if (comments.length > 0) starIcon.innerText = '*';
  }

  function resetForm() {
    try {
      document.querySelectorAll("input[type=number]").forEach(x => x.value = 0);
      document.getElementById("comments").value = "";
      document.getElementById("openingTarget").value = "0";
      document.getElementById("starIcon").style.display = "none";
      document.getElementById("date").value = getKuchingDate();
      updateDayOfWeek();
      updateReceiptNo();
      calc();
    } catch (error) {
      alert("Error resetting: " + error.message);
    }
  }

  // save / load / history
  function saveReceipt() {
    try {
      calcOpeningCash();
      const data = {
        receiptNo: document.getElementById("receiptNo").innerText,
        date: document.getElementById("date").value,
        dayOfWeek: document.getElementById("dayOfWeek").innerText,
        total: document.getElementById("total").innerText,
        comments: document.getElementById("comments").value,
        qtys: denoms.map((_, i) => document.getElementById("q" + i).value)
      };
      let receipts = JSON.parse(localStorage.getItem("receipts") || "[]");
      receipts.unshift(data);
      localStorage.setItem("receipts", JSON.stringify(receipts));
      alert("Receipt saved");
      renderHistory();
    } catch (error) {
      alert("Error saving: " + (error.message || "Unknown"));
      console.error(error);
    }
  }

  function renderHistory() {
    try {
      let receipts = JSON.parse(localStorage.getItem("receipts") || "[]");
      let q = document.getElementById("search").value.toLowerCase();
      let html = "";
      const filtered = receipts.filter(r =>
        r.receiptNo.toLowerCase().includes(q) ||
        r.date.toLowerCase().includes(q) ||
        r.total.toLowerCase().includes(q) ||
        (r.comments && r.comments.toLowerCase().includes(q))
      );
      filtered.forEach((r, idx) => {
        const realIndex = receipts.indexOf(r);
        html += `<div class='history-item'>
          <b>${r.receiptNo}</b><br>
          ${r.date} - ${r.dayOfWeek || ""}<br>
          RM ${r.total}<br>`;
        if (r.comments) html += `<p style='font-size:11px;margin:4px 0;color:#666;font-style:italic;'>"${r.comments.substring(0, 50)}${r.comments.length > 50 ? "..." : ""}"</p>`;
        html += `<button class='btn-view' onclick='loadReceipt(${realIndex})'>View</button>
          <button class='btn-delete' onclick='deleteReceipt(${realIndex})'>Delete</button>
          </div>`;
      });
      document.getElementById("history").innerHTML = html || "<p style='color:#999;text-align:center;padding:20px;'>No receipts found</p>";
    } catch (error) {
      console.error("Render error:", error);
    }
  }

  function loadReceipt(index) {
    try {
      let receipts = JSON.parse(localStorage.getItem("receipts") || "[]");
      let r = receipts[index];
      document.getElementById("receiptNo").innerText = r.receiptNo;
      document.getElementById("date").value = r.date;
      document.getElementById("comments").value = r.comments || "";
      document.getElementById("openingTarget").value = "0";
      updateDayOfWeek();
      updateReceiptNo();
      r.qtys.forEach((v, i) => document.getElementById("q" + i).value = v);
      calc();
      calcOpeningCash();
      toggleCommentsDisplay();
    } catch (error) {
      alert("Error loading: " + error.message);
    }
  }

  function deleteReceipt(index) {
    try {
      let receipts = JSON.parse(localStorage.getItem("receipts") || "[]");
      receipts.splice(index, 1);
      localStorage.setItem("receipts", JSON.stringify(receipts));
      renderHistory();
    } catch (error) {
      alert("Error deleting: " + error.message);
    }
  }

  // export: PDF / Image
  async function savePDF() {
    try {
      const { jsPDF } = window.jspdf;
      const receiptArea = document.getElementById("receiptArea");
      const openingPanel = document.getElementById("openingCashPanel");
      const starIcon = document.getElementById("starIcon");
      const commentsArea = document.getElementById("comments");

      const saved = { opening: openingPanel.style.display, star: starIcon.style.display, comments: commentsArea.style.display };
      openingPanel.style.display = 'none';
      starIcon.style.display = 'none';
      if (!commentsArea.value.trim()) commentsArea.style.display = 'none';

      await new Promise(r => setTimeout(r, 80));
      const canvas = await html2canvas(receiptArea, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });

      openingPanel.style.display = saved.opening;
      starIcon.style.display = saved.star;
      commentsArea.style.display = saved.comments;

      const imgData = canvas.toDataURL("image/png");
      const pdfWidth = 210,
        imgWidth = 100,
        imgHeight = (canvas.height * imgWidth) / canvas.width;
      const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      pdf.addImage(imgData, "PNG", (pdfWidth - imgWidth) / 2, 20, imgWidth, imgHeight);
      pdf.save(document.getElementById("receiptNo").innerText + ".pdf");
      alert("PDF saved");
    } catch (error) {
      alert("PDF error: " + (error.message || "try again"));
      console.error(error);
    }
  }

  async function saveImage() {
    try {
      const receiptArea = document.getElementById("receiptArea");
      const openingPanel = document.getElementById("openingCashPanel");
      const starIcon = document.getElementById("starIcon");
      const commentsArea = document.getElementById("comments");

      const saved = { opening: openingPanel.style.display, star: starIcon.style.display, comments: commentsArea.style.display };
      openingPanel.style.display = 'none';
      starIcon.style.display = 'none';
      if (!commentsArea.value.trim()) commentsArea.style.display = 'none';

      await new Promise(r => setTimeout(r, 80));
      const canvas = await html2canvas(receiptArea, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });

      openingPanel.style.display = saved.opening;
      starIcon.style.display = saved.star;
      commentsArea.style.display = saved.comments;

      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = document.getElementById("receiptNo").innerText + ".png";
      link.click();
      alert("Image saved");
    } catch (error) {
      alert("Image error: " + (error.message || "try again"));
      console.error(error);
    }
  }

  // helpers
  function getKuchingDate() {
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset() * 60000;
    const kuching = new Date(utc + 8 * 3600000);
    const y = kuching.getFullYear();
    const m = String(kuching.getMonth() + 1).padStart(2, '0');
    const d = String(kuching.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function updateDayOfWeek() {
    const dateVal = document.getElementById("date").value;
    if (!dateVal) return;
    const [y, m, d] = dateVal.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    document.getElementById("dayOfWeek").innerText = days[date.getDay()];
    updateReceiptNo();
  }

  // init
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("date").value = getKuchingDate();
    updateDayOfWeek();
    resetForm();
    renderHistory();
  });
</script>
</body>
</html>
